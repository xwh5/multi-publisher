name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Type check
        run: npm run typecheck
        env:
          CI: true

      - name: Publish to npm
        run: |
          unset NODE_AUTH_TOKEN
          echo "=== Testing npm registry connectivity ==="
          curl -sI https://registry.npmjs.org/multi-publisher | head -5
          echo "=== Checking npm whoami ==="
          npm whoami || echo "npm whoami failed"
          echo "=== Publishing multi-publisher ==="
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Publishing multi-publisher@$VERSION"
          npm publish --access public

  create-release:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
